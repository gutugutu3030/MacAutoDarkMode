name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-validation:
    name: runtime-validation
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('build.gradle.kts', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties', 'Scripts/validate.sh', 'Scripts/build-app.sh', 'Scripts/build-kotlin-app.sh', 'AppResources/Info.plist', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          java -version

      - name: Run Kotlin runtime validation
        run: ./Scripts/validate.sh

  gradle-check:
    name: gradle-check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('build.gradle.kts', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          ./gradlew --version
          java -version

      - name: Run Gradle checks
        run: ./gradlew check
