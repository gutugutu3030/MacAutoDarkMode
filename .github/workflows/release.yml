name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('kmp/gradle/libs.versions.toml', 'kmp/build.gradle.kts', 'kmp/settings.gradle.kts', 'kmp/gradle.properties', 'kmp/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build app bundle
        run: |
          chmod +x Scripts/build-app.sh
          ./Scripts/build-app.sh

      - name: Package release asset
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent dist/autoDarkMode.app release-assets/autoDarkMode-macOS.zip
          shasum -a 256 release-assets/autoDarkMode-macOS.zip > release-assets/autoDarkMode-macOS.zip.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/autoDarkMode-macOS.zip
            release-assets/autoDarkMode-macOS.zip.sha256